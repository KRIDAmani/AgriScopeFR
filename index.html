const PREV = {2000:1990, 2010:2000, 2020:2010};

function makeBulletin(year, region) {
    const prev = PREV[year];
    if (!prev) return null;

    const scope = region ? [region] : Object.keys(CROP_DATA[year]).slice(0, 8);

    let maxD = 0, bigKey = '', bigReg = '';
    const keyMap = { g:'grandes cultures', e:"l'élevage", m:'le maraîchage', v:'la viticulture', f:'les fruits' };
    scope.forEach(r => {
        const c = CROP_DATA[year]?.[r], p = CROP_DATA[prev]?.[r];
        if (!c || !p) return;
        ['g','e','m','v','f'].forEach(k => {
            const d = (c[k]||0) - (p[k]||0);
            if (Math.abs(d) > Math.abs(maxD)) { maxD = d; bigKey = k; bigReg = r; }
        });
    });

    const wDs=[], gDs=[];
    scope.forEach(r => {
        const c = ENV_DATA[year]?.[r], p = ENV_DATA[prev]?.[r];
        if (c && p) { wDs.push(c.water - p.water); gDs.push(c.ges - p.ges); }
    });
    const avgW = wDs.length ? Math.round(wDs.reduce((a,b)=>a+b)/wDs.length) : null;
    const avgG = gDs.length ? +(gDs.reduce((a,b)=>a+b)/gDs.length).toFixed(1) : null;

    const where = region ? `en ${region}` : 'sur le territoire national';

    const cropLine = bigKey ? (maxD > 0
        ? `${keyMap[bigKey]} progresse de ${maxD.toFixed(1)} points ${where} — la spécialisation territoriale s'accentue.`
        : `${keyMap[bigKey]} recule de ${Math.abs(maxD).toFixed(1)} points ${where}, signe d'une recomposition des filières.`
    ) : null;

    const waterLine = avgW !== null ? (avgW > 0
        ? `La consommation d'eau augmente de ${avgW} m³/ha — les sécheresses répétées et l'extension des cultures irriguées pèsent sur les ressources.`
        : `La consommation d'eau recule de ${Math.abs(avgW)} m³/ha, reflet de la modernisation des systèmes d'irrigation.`
    ) : null;

    const gesLine = avgG !== null ? (avgG < 0
        ? `Les émissions de GES diminuent de ${Math.abs(avgG)} Mt CO₂eq — les efforts sur la gestion des élevages et la fertilisation raisonnée portent leurs fruits.`
        : `Les émissions de GES augmentent de ${avgG} Mt CO₂eq, malgré les progrès techniques de la filière.`
    ) : null;

    return { year, prev, cropLine, waterLine, gesLine };
}

                            <p style={{fontFamily:'var(--serif)', fontSize:'13px', lineHeight:1.6, color:'var(--ink-2)'}}>
                                Chaque région développe son identité : le Grand Est et la Nouvelle-Aquitaine renforcent 
                                leur viticulture (+2 pts), tandis que le maraîchage progresse en PACA (+2 pts) et

function App() {
    const [geo, setGeo]                   = useState(null);
    const [region, setRegion]             = useState(null);
    const [year, setYear]                 = useState(2020);
    const [ind, setInd]                   = useState('cultures');
    const [playing, setPlaying]           = useState(false);
    const [mapSize, setMapSize]           = useState({w:0,h:0});
    const [bulletin, setBulletin]         = useState(null);
    const [showBulletin, setShowBulletin] = useState(false);
    const [sidebarWidth, setSidebarWidth] = useState(320);
    const [isDragging, setIsDragging]     = useState(false);
    const [showWelcome, setShowWelcome]   = useState(true);
    const [showAbout, setShowAbout]       = useState(false);
    const [tooltip, setTooltip]           = useState(null);

    const mapEl     = useRef(null);
    const radarEl   = useRef(null);
    const evoEl     = useRef(null);
    const prevYrRef = useRef(null);
    const timerRef  = useRef(null);

    useEffect(() => {
        fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions-version-simplifiee.geojson')
            .then(r => r.json()).then(setGeo)
            .catch(() => setGeo({type:'FeatureCollection',features:[]}));
    }, []);

    useEffect(() => {
        if (!mapEl.current) return;
        const el = mapEl.current;
        const sync = () => setMapSize({w: el.clientWidth, h: el.clientHeight});
        sync();
        const obs = new ResizeObserver(sync);
        obs.observe(el);
        return () => obs.disconnect();
    }, []);

    useEffect(() => {
        if (!playing) return;
        const yrs = [1990,2000,2010,2020];
        const t = setTimeout(() => setYear(yrs[(yrs.indexOf(year)+1)%yrs.length]), 2000);
        return () => clearTimeout(t);
    }, [playing, year]);

    useEffect(() => {
        if (prevYrRef.current !== null && prevYrRef.current !== year) {
            const b = makeBulletin(year, region);
            if (b) {
                clearTimeout(timerRef.current);
                setBulletin(b);
                setShowBulletin(true);
                timerRef.current = setTimeout(() => setShowBulletin(false), 7000);
            }
        }
        prevYrRef.current = year;
    }, [year, region]);


    const handleMouseDown = useCallback((e) => {
        e.preventDefault();
        setIsDragging(true);
    }, []);

    useEffect(() => {
        if (!isDragging) return;
        
        const handleMouseMove = (e) => {
            const newWidth = window.innerWidth - e.clientX;
            setSidebarWidth(Math.max(240, Math.min(600, newWidth)));
        };

        const handleMouseUp = () => {
            setIsDragging(false);
        };

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        
        return () => {
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
        };
    }, [isDragging]);

    const dominant = d => {
        const entries = Object.entries(d).filter(([k]) => k.length===1);
        return entries.reduce((a,b) => a[1]>b[1]?a:b)[0];
    };

    useEffect(() => {
        if (!mapEl.current || !geo) return;
        const W = mapSize.w || mapEl.current.clientWidth;
        const H = mapSize.h || mapEl.current.clientHeight;
        if (W < 10 || H < 10) return;

        d3.select(mapEl.current).selectAll('*').remove();

        const svg = d3.select(mapEl.current)
            .append('svg').attr('width',W).attr('height',H)
            .attr('xmlns:xhtml','http://www.w3.org/1999/xhtml');

        const proj = region
            ? (() => {
                const feat = geo.features.find(f => (f.properties.nom||f.properties.name) === region);
                return feat
                    ? d3.geoMercator().fitExtent([[48,48],[W-48,H-48]], feat)
                    : d3.geoMercator().fitExtent([[16,16],[W-16,H-16]], geo);
              })()
            : d3.geoMercator().fitExtent([[16,16],[W-16,H-16]], geo);

        const path = d3.geoPath().projection(proj);
        const waterScale = d3.scaleSequential(d3.interpolate('#dce8f5','#1a4a82')).domain([600,2600]);
        const gesScale   = d3.scaleSequential(d3.interpolate('#f5e8dc','#7a1a10')).domain([2,11]);

        const features = region
            ? geo.features.filter(f => (f.properties.nom||f.properties.name) === region)
            : geo.features;

        features.forEach(feat => {
            const name = feat.properties.nom || feat.properties.name;
            const cd   = CROP_DATA[year]?.[name];
            const ed   = ENV_DATA[year]?.[name];

            let fill = '#D6CFCA';
            if (cd) {
                if (ind === 'cultures')   fill = COLORS[dominant(cd)];
                else if (ind === 'eau' && ed)  fill = waterScale(ed.water);
                else if (ind === 'ges'  && ed) fill = gesScale(ed.ges);
            }

            const p = svg.append('path').datum(feat)
                .attr('d', path)
                .attr('fill', fill)
                .attr('stroke', '#F4F1EC')
                .attr('stroke-width', region ? 1.5 : 0.75)
                .attr('class','region-path')
                .on('click', () => setRegion(name === region ? null : (region ? null : name)))
                .on('mouseenter', (event) => {
                    if (!cd || !ed) return;
                    const domKey = dominant(cd);
                    const tooltipHtml = `
                        <div class="tooltip-title">${name}</div>
                        ${ind === 'cultures' ? `<div class="tooltip-value">Culture dominante : ${LABELS[domKey]} (${cd[domKey]}%)</div>` : ''}
                        ${ind === 'eau' ? `<div class="tooltip-value">Eau : ${ed.water.toLocaleString('fr-FR')} m³/ha</div>` : ''}
                        ${ind === 'ges' ? `<div class="tooltip-value">GES : ${ed.ges} Mt CO₂eq</div>` : ''}
                    `;
                    setTooltip({ x: event.pageX, y: event.pageY, html: tooltipHtml });
                })
                .on('mousemove', (event) => {
                    setTooltip(t => t ? { ...t, x: event.pageX, y: event.pageY } : null);
                })
                .on('mouseleave', () => {
                    setTooltip(null);
                });

            p.append('title').text(name === region ? 'Cliquer pour revenir' : name);

            const [cx,cy] = path.centroid(feat);
            if (isNaN(cx)||isNaN(cy)) return;

            /* region label */
            if (!region || region === name) {
                svg.append('text')
                    .attr('x',cx).attr('y', cy - (region ? 38 : 10))
                    .attr('text-anchor','middle')
                    .attr('font-size', region ? '18px' : '9.5px')
                    .attr('font-family', "'IBM Plex Sans', sans-serif")
                    .attr('font-weight', region ? '500' : '400')
                    .attr('fill', region ? '#1C1917' : '#3C3530')
                    .style('pointer-events','none')
                    .text(name);

                if (cd && ind === 'cultures') {
                    const top = ['g','e','m','v','f']
                        .map(k => ({k, v: cd[k]}))
                        .filter(x => x.v >= (region ? 10 : 18))
                        .sort((a,b) => b.v - a.v)
                        .slice(0, region ? 4 : 2);

                    top.forEach(({k,v}, i) => {
                        const oy  = region ? 8 + i*36 : 4 + i*16;
                        const fs  = region ? '24px' : '13px';
                        const cls = ANIM[k];
                        const delay = (Math.random()*2).toFixed(2);

                        const fo = svg.append('foreignObject')
                            .attr('x',cx-18).attr('y',cy+oy-16)
                            .attr('width',36).attr('height',36)
                            .style('pointer-events','none').style('overflow','visible');
                        fo.append('xhtml:div')
                            .attr('class', cls)
                            .style('font-size',fs).style('text-align','center')
                            .style('line-height','1').style('animation-delay',`${delay}s`)
                            .html(EMOJIS[k]);

                        if (region) {
                            svg.append('text')
                                .attr('x',cx+32).attr('y',cy+oy+7)
                                .attr('font-size','12px').attr('fill','#3C3530')
                                .attr('font-family',"'IBM Plex Mono',monospace").attr('font-weight','500')
                                .style('pointer-events','none').text(`${v}%`);
                        }
                    });
                }
            }
        });

    }, [region, year, ind, geo, mapSize]);

    useEffect(() => {
        if (!radarEl.current) return;
        const W=280, H=260, PAD=46, R=Math.min(W,H)/2-PAD;
        d3.select(radarEl.current).selectAll('*').remove();

        const svg = d3.select(radarEl.current)
            .append('svg').attr('width','100%').attr('viewBox',`0 0 ${W} ${H}`).attr('height','auto');
        const g   = svg.append('g').attr('transform',`translate(${W/2},${H/2})`);
        const keys = ['g','e','m','v','f','a'];
        const slc = Math.PI*2/keys.length;

        // rings
        [1,2,3,4].forEach(i => {
            g.append('circle').attr('r',R*i/4).attr('fill','none')
             .attr('stroke','#E2DDD8').attr('stroke-width', i===4 ? 1 : 0.5);
        });

        keys.forEach((k,i) => {
            const a = i*slc - Math.PI/2;
            const x = R*Math.cos(a), y = R*Math.sin(a);
            g.append('line').attr('x1',0).attr('y1',0).attr('x2',x).attr('y2',y)
             .attr('stroke','#E2DDD8').attr('stroke-width',0.75);
            const lx=(R+18)*Math.cos(a), ly=(R+18)*Math.sin(a);
            g.append('text').attr('x',lx).attr('y',ly)
             .attr('text-anchor','middle').attr('dominant-baseline','middle')
             .attr('font-size','8px').attr('fill','#9E9690')
             .attr('font-family',"'IBM Plex Sans',sans-serif")
             .text(LABELS[k]);
        });

        const lineGen = d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveLinearClosed);
        const regions = region ? [region] : Object.keys(CROP_DATA[year]);

        regions.forEach(reg => {
            const cd = CROP_DATA[year][reg];
            if (!cd) return;
            const dom = dominant(cd);
            const col = COLORS[dom];
            const pts = keys.map((k,i) => {
                const a = i*slc - Math.PI/2, r = (cd[k]/100)*R;
                return {x: r*Math.cos(a), y: r*Math.sin(a), k, v: cd[k], a};
            });
            g.append('path').datum(pts).attr('d',lineGen)
             .attr('fill',col).attr('fill-opacity', region ? 0.18 : 0.05)
             .attr('stroke',col).attr('stroke-width', region ? 2 : 0.8).attr('stroke-opacity', region ? 0.9 : 0.7);
            pts.forEach(pt => {
                g.append('circle').attr('cx',pt.x).attr('cy',pt.y).attr('r', region ? 2.5 : 1.5)
                 .attr('fill',col).attr('stroke','#FAFAF8').attr('stroke-width', region ? 1 : 0.5);

                if (region && pt.v > 0) {
                    const offset = 11;
                    const lx = pt.x + offset * Math.cos(pt.a);
                    const ly = pt.y + offset * Math.sin(pt.a);
                    g.append('text')
                        .attr('x', lx).attr('y', ly)
                        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                        .attr('font-size', '8px').attr('font-weight', '500')
                        .attr('font-family', "'IBM Plex Mono', monospace")
                        .attr('fill', col)
                        .style('pointer-events', 'none')
                        .text(`${pt.v}%`);
                }
            });
        });

    }, [region, year]);

    useEffect(() => {
        if (!evoEl.current || !region) return;
        const W=290, H=170, m={top:12,right:64,bottom:32,left:36};
        d3.select(evoEl.current).selectAll('*').remove();

        const svg = d3.select(evoEl.current)
            .append('svg').attr('width','100%').attr('viewBox',`0 0 ${W} ${H}`).attr('height','auto');

        const years=[1990,2000,2010,2020];
        const keys =['g','e','v','m'];
        const x = d3.scaleLinear().domain([1990,2020]).range([m.left,W-m.right]);
        const y = d3.scaleLinear().domain([0,80]).range([H-m.bottom,m.top]);
        const lineGen = d3.line().x(d=>x(d.yr)).y(d=>y(d.val)).curve(d3.curveMonotoneX);

        [20,40,60,80].forEach(v => {
            svg.append('line').attr('x1',m.left).attr('x2',W-m.right)
               .attr('y1',y(v)).attr('y2',y(v))
               .attr('stroke','#E2DDD8').attr('stroke-width',0.5);
        });

        svg.append('g').attr('transform',`translate(0,${H-m.bottom})`)
           .call(d3.axisBottom(x).tickFormat(d3.format('d')).ticks(4).tickSize(0))
           .call(g => g.select('.domain').attr('stroke','#E2DDD8'))
           .call(g => g.selectAll('text').attr('font-family',"'IBM Plex Mono',monospace")
               .attr('font-size','8px').attr('fill','#9E9690').attr('dy','10'));

        svg.append('g').attr('transform',`translate(${m.left},0)`)
           .call(d3.axisLeft(y).ticks(4).tickSize(0))
           .call(g => g.select('.domain').remove())
           .call(g => g.selectAll('text').attr('font-family',"'IBM Plex Mono',monospace")
               .attr('font-size','8px').attr('fill','#9E9690').attr('dx','-4'));

        keys.forEach(k => {
            const vals = years.map(yr => ({yr, val: CROP_DATA[yr]?.[region]?.[k]||0}));
            svg.append('path').datum(vals).attr('fill','none')
               .attr('stroke',COLORS[k]).attr('stroke-width',1.8).attr('d',lineGen);
            vals.forEach(d => {
                svg.append('circle').attr('cx',x(d.yr)).attr('cy',y(d.val)).attr('r',3)
                   .attr('fill',COLORS[k]).attr('stroke','#FAFAF8').attr('stroke-width',1.2);
            });
            const last = vals[vals.length-1];
            svg.append('text').attr('x',W-m.right+5).attr('y',y(last.val)+3.5)
               .attr('font-size','8px').attr('fill',COLORS[k])
               .attr('font-family',"'IBM Plex Sans',sans-serif").text(LABELS[k]);
        });

        svg.append('line')
           .attr('x1',x(year)).attr('x2',x(year))
           .attr('y1',m.top).attr('y2',H-m.bottom)
           .attr('stroke','#1C1917').attr('stroke-width',1).attr('stroke-dasharray','3,2')
           .attr('stroke-opacity',0.4);

    }, [region, year]);

    const regionCrops = region ? CROP_DATA[year]?.[region] : null;
    const regionEnv   = region ? ENV_DATA[year]?.[region]  : null;

    const exportPNG = async () => {
        try {
            const canvas = await html2canvas(mapEl.current, {backgroundColor:'#F4F1EC',scale:2});
            Object.assign(document.createElement('a'), {download:`agriscopefr-${year}.png`, href:canvas.toDataURL()}).click();
        } catch(e) { alert('Erreur export PNG'); }
    };
    const exportPDF = async () => {
        try {
            const {jsPDF} = window.jspdf;
            const pdf = new jsPDF('p','mm','a4');
            pdf.setFontSize(18); pdf.setTextColor(28,25,23);
            pdf.text('AgriScopeFR', 20, 20);
            pdf.setFontSize(10); pdf.setTextColor(87,83,78);
            pdf.text(`Agriculture en France · ${year}`, 20, 27);
            const canvas = await html2canvas(mapEl.current, {backgroundColor:'#F4F1EC',scale:1.5});
            pdf.addImage(canvas.toDataURL('image/png'),'PNG',20,34,170,120);
            if (region && regionCrops) {
                pdf.setFontSize(12); pdf.setTextColor(28,25,23);
                pdf.text(region, 20, 164);
                pdf.setFontSize(9); pdf.setTextColor(87,83,78);
                let yp = 172;
                Object.entries(regionCrops).forEach(([k,v]) => {
                    pdf.text(`${LABELS[k]} : ${v}%`, 26, yp); yp += 6;
                });
            }
            pdf.setFontSize(7); pdf.setTextColor(168,162,158);
            pdf.text('AgriScopeFR · Recensements Agricoles 1990–2020', 20, 287);
            pdf.save(`agriscopefr-${year}.pdf`);
        } catch(e) { alert('Erreur export PDF'); }
    };

    return (
        <div style={{height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)', overflow:'hidden', userSelect: isDragging ? 'none' : 'auto'}}>

            {/* MODALS */}
            {showWelcome && <WelcomeModal onClose={() => setShowWelcome(false)} />}
            {showAbout && <AboutModal onClose={() => setShowAbout(false)} />}

            {/* TOOLTIP */}
            {tooltip && (
                <div className="tooltip" style={{ left: tooltip.x + 10, top: tooltip.y + 10 }} 
                     dangerouslySetInnerHTML={{ __html: tooltip.html }} />
            )}

            {/* ── HEADER ── */}
            <header style={{
                background: 'var(--surface)',
                borderBottom: '1px solid var(--rule)',
                padding: '0 20px',
                height: 52,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                flexShrink: 0,
                gap: 16,
            }}>
                {/* title */}
                <div style={{display:'flex', alignItems:'baseline', gap:12}}>
                    <span style={{
                        fontFamily:'var(--serif)', fontWeight:600,
                        fontSize:'1.1rem', color:'var(--ink)', letterSpacing:'-0.01em',
                    }}>AgriScopeFR</span>
                    <span style={{
                        fontFamily:'var(--sans)', fontWeight:300,
                        fontSize:'11px', color:'var(--ink-3)',
                        borderLeft:'1px solid var(--rule)', paddingLeft:12,
                    }}>Agriculture en France · 1990–2020</span>
                </div>

                {/* controls */}
                <div style={{display:'flex', alignItems:'center', gap:14}}>
                    {/* indicator tabs */}
                    <div style={{display:'flex', gap:3}}>
                        {[
                            {v:'cultures', l:'Cultures'},
                            {v:'eau',      l:'Eau'},
                            {v:'ges',      l:'Émissions'},
                        ].map(({v,l}) => (
                            <button key={v} className={`ind-tab${ind===v?' on':''}`} onClick={()=>setInd(v)}>{l}</button>
                        ))}
                    </div>

                    {/* divider */}
                    <div style={{width:1, height:20, background:'var(--rule)'}} />

                    {/* year */}
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                        <button className={`play-btn${playing?' active':''}`} onClick={()=>setPlaying(!playing)}>
                            {playing ? 'Pause' : 'Lecture'}
                        </button>
                        <div style={{width:160}}>
                            <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                                <span style={{fontFamily:'var(--mono)', fontSize:'10px', color:'var(--ink-3)'}}>Année</span>
                                <span style={{fontFamily:'var(--mono)', fontSize:'11px', fontWeight:500, color:'var(--ink)'}}>{year}</span>
                            </div>
                            <input type="range" min="1990" max="2020" step="10" value={year}
                                onChange={e => { setYear(+e.target.value); setPlaying(false); }} />
                        </div>
                    </div>

                    {/* divider */}
                    <div style={{width:1, height:20, background:'var(--rule)'}} />

                    {/* exports + about */}
                    <div style={{display:'flex', gap:4}}>
                        <button className="exp-btn" onClick={exportPNG}>PNG</button>
                        <button className="exp-btn" onClick={exportPDF}>PDF</button>
                        <button className="info-btn" onClick={() => setShowAbout(true)}>ℹ️ Sources</button>
                    </div>
                </div>
            </header>

            {/* ── BODY ── */}
            <div style={{flex:1, display:'flex', overflow:'hidden', minHeight:0}}>

                {/* MAP PANEL */}
                <div style={{flex:1, position:'relative', overflow:'hidden', background:'#ECEAE3'}}>

                    {/* map container — observed */}
                    <div ref={mapEl} style={{position:'absolute', inset:0}}>
                        {!geo && (
                            <div style={{
                                position:'absolute', inset:0, display:'flex',
                                alignItems:'center', justifyContent:'center',
                                fontFamily:'var(--sans)', fontSize:'13px', color:'var(--ink-3)',
                                fontStyle:'italic',
                            }}>
                                Chargement…
                            </div>
                        )}
                    </div>

                    {/* bulletin strip */}
                    {showBulletin && bulletin && (
                        <div className="bulletin-in" style={{
                            position:'absolute', bottom:0, left:0, right:0,
                            background:'rgba(250,250,248,0.96)',
                            backdropFilter:'blur(6px)',
                            borderTop:'1px solid var(--rule)',
                            padding:'14px 20px 12px',
                            zIndex:20,
                        }}>
                            {/* header line */}
                            <div style={{display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:10}}>
                                <div style={{display:'flex', alignItems:'baseline', gap:8}}>
                                    <span style={{
                                        fontFamily:'var(--mono)', fontSize:'9px',
                                        color:'var(--ink-3)', letterSpacing:'0.1em', textTransform:'uppercase',
                                    }}>Évolution {bulletin.prev}–{bulletin.year}</span>
                                    {region && <span style={{fontFamily:'var(--mono)', fontSize:'9px', color:'var(--accent)'}}>· {region}</span>}
                                </div>
                                <button onClick={()=>setShowBulletin(false)} style={{
                                    background:'none', border:'none', cursor:'pointer',
                                    fontFamily:'var(--sans)', fontSize:'16px',
                                    color:'var(--ink-3)', lineHeight:1, padding:0,
                                }}>×</button>
                            </div>

                            {/* three sentences */}
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16}}>
                                {[
                                    {line: bulletin.cropLine,  label:'Cultures',   col:'var(--accent)'},
                                    {line: bulletin.waterLine, label:'Eau',         col:'var(--blue)'},
                                    {line: bulletin.gesLine,   label:'Émissions',   col:'var(--red)'},
                                ].map(({line,label,col}) => line && (
                                    <div key={label} className="fade-in">
                                        <span style={{
                                            display:'inline-block',
                                            fontFamily:'var(--mono)', fontSize:'8px',
                                            letterSpacing:'0.1em', textTransform:'uppercase',
                                            color: col, marginBottom:4,
                                        }}>{label}</span>
                                        <p style={{
                                            margin:0, fontFamily:'var(--serif)',
                                            fontSize:'12px', lineHeight:1.6,
                                            color:'var(--ink-2)', fontStyle:'italic',
                                        }}>{line}</p>
                                    </div>
                                ))}
                            </div>

                            {/* drain bar */}
                            <div style={{marginTop:10, height:1, background:'var(--rule)', overflow:'hidden'}}>
                                <div style={{height:'100%', background:'var(--ink-3)', animation:'drain 7s linear forwards'}} />
                            </div>
                        </div>
                    )}

                    {/* legend — more visible */}
                    <div style={{
                        position:'absolute', top:12, left:12,
                        background:'rgba(250,250,248,0.96)',
                        backdropFilter:'blur(4px)',
                        border:'1px solid var(--rule)',
                        borderRadius:3,
                        padding:'10px 14px',
                        zIndex:10,
                        boxShadow:'0 2px 8px rgba(0,0,0,0.08)',
                    }}>
                        {ind === 'cultures' && (
                            <div style={{display:'flex', flexDirection:'column', gap:5}}>
                                <div style={{fontFamily:'var(--mono)', fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:2}}>Légende</div>
                                {Object.entries(COLORS).map(([k,col]) => (
                                    <div key={k} style={{display:'flex', alignItems:'center', gap:8}}>
                                        <div style={{width:12, height:12, borderRadius:1, background:col, flexShrink:0}} />
                                        <span style={{fontFamily:'var(--sans)', fontSize:'11px', color:'var(--ink-2)'}}>{LABELS[k]}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        {ind === 'eau' && (
                            <div>
                                <div style={{fontFamily:'var(--mono)', fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:6}}>Consommation d'eau</div>
                                <div style={{width:100, height:8, borderRadius:1, background:'linear-gradient(to right,#dce8f5,#1a4a82)', marginBottom:6}} />
                                <div style={{display:'flex', justifyContent:'space-between', fontFamily:'var(--mono)', fontSize:'9px', color:'var(--ink-3)'}}>
                                    <span>600</span><span>2 600 m³/ha</span>
                                </div>
                            </div>
                        )}
                        {ind === 'ges' && (
                            <div>
                                <div style={{fontFamily:'var(--mono)', fontSize:'8px', letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--ink-3)', marginBottom:6}}>Émissions GES</div>
                                <div style={{width:100, height:8, borderRadius:1, background:'linear-gradient(to right,#f5e8dc,#7a1a10)', marginBottom:6}} />
                                <div style={{display:'flex', justifyContent:'space-between', fontFamily:'var(--mono)', fontSize:'9px', color:'var(--ink-3)'}}>
                                    <span>2</span><span>11 Mt CO₂eq</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* back button when zoomed */}
                    {region && (
                        <button onClick={() => setRegion(null)} style={{
                            position:'absolute', top:12, right:12, zIndex:10,
                            background:'rgba(250,250,248,0.96)', backdropFilter:'blur(4px)',
                            border:'1px solid var(--rule)', borderRadius:3,
                            fontFamily:'var(--sans)', fontSize:'11px', color:'var(--ink-2)',
                            padding:'6px 12px', cursor:'pointer',
                            boxShadow:'0 2px 8px rgba(0,0,0,0.08)',
                        }}>
                            ← France entière
                        </button>
                    )}
                </div>

                {/* RIGHT SIDEBAR */}
                <div style={{
                    width: sidebarWidth,
                    flexShrink: 0,
                    position: 'relative',
                    background:'var(--surface)',
                    borderLeft:'1px solid var(--rule)',
                    display:'flex', flexDirection:'column',
                    overflowY:'auto', minHeight:0,
                }}>
                    {/* RESIZE HANDLE */}
                    <div 
                        className={`resize-handle${isDragging ? ' dragging' : ''}`}
                        onMouseDown={handleMouseDown}
                    />

                    {/* radar */}
                    <div style={{padding:'16px 16px 8px', borderBottom:'1px solid var(--rule)'}}>
                        <p style={{fontFamily:'var(--serif)', fontSize:'11px', fontWeight:600, color:'var(--ink)', marginBottom:10}}>
                            Profil agricole{region ? ` — ${region}` : ', 12 régions'}
                        </p>
                        <div ref={radarEl} />
                    </div>

                    {/* evolution */}
                    {region && (
                        <div style={{padding:'14px 16px 8px', borderBottom:'1px solid var(--rule)'}}>
                            <p style={{fontFamily:'var(--serif)', fontSize:'11px', fontWeight:600, color:'var(--ink)', marginBottom:10}}>
                                Évolution 1990–2020
                            </p>
                            <div ref={evoEl} />
                            <p style={{fontFamily:'var(--sans)', fontSize:'9px', color:'var(--ink-3)', marginTop:6, fontStyle:'italic'}}>
                                Trait vertical = {year}
                            </p>
                        </div>
                    )}

                    {/* stats */}
                    <div style={{padding:'14px 16px', flex:1}}>
                        {region && regionCrops ? (
                            <>
                                <p style={{fontFamily:'var(--serif)', fontSize:'11px', fontWeight:600, color:'var(--ink)', marginBottom:12}}>
                                    {region} · <span style={{fontFamily:'var(--mono)', fontWeight:400, color:'var(--ink-3)'}}>{year}</span>
                                </p>

                                {/* crop bars */}
                                <div style={{display:'flex', flexDirection:'column', gap:7, marginBottom:14}}>
                                    {Object.entries(regionCrops).map(([k,v]) => (
                                        <div key={k} style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                                            <span style={{fontFamily:'var(--sans)', fontSize:'11px', color:'var(--ink-2)', width:100, flexShrink:0}}>{LABELS[k]}</span>
                                            <div style={{flex:1, display:'flex', alignItems:'center', gap:8}}>
                                                <div className="stat-bar-track" style={{flex:1}}>
                                                    <div className="stat-bar-fill" style={{width:`${v}%`, background:COLORS[k]}} />
                                                </div>
                                                <span style={{fontFamily:'var(--mono)', fontSize:'10px', color:'var(--ink-2)', width:28, textAlign:'right'}}>{v}%</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* env data */}
                                {regionEnv && (
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                                        <div style={{background:'var(--bg)', borderRadius:3, padding:'8px 10px'}}>
                                            <div style={{fontFamily:'var(--mono)', fontSize:'8px', color:'var(--ink-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4}}>Eau</div>
                                            <div style={{fontFamily:'var(--serif)', fontSize:'1.2rem', fontWeight:600, color:'var(--blue)', lineHeight:1}}>{regionEnv.water.toLocaleString('fr-FR')}</div>
                                            <div style={{fontFamily:'var(--sans)', fontSize:'9px', color:'var(--ink-3)', marginTop:2}}>m³/ha</div>
                                        </div>
                                        <div style={{background:'var(--bg)', borderRadius:3, padding:'8px 10px'}}>
                                            <div style={{fontFamily:'var(--mono)', fontSize:'8px', color:'var(--ink-3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4}}>GES</div>
                                            <div style={{fontFamily:'var(--serif)', fontSize:'1.2rem', fontWeight:600, color:'var(--red)', lineHeight:1}}>{regionEnv.ges}</div>
                                            <div style={{fontFamily:'var(--sans)', fontSize:'9px', color:'var(--ink-3)', marginTop:2}}>Mt CO₂eq</div>
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div style={{paddingTop:16}}>
                                <p style={{fontFamily:'var(--serif)', fontSize:'13px', color:'var(--ink-3)', fontStyle:'italic', lineHeight:1.6}}>
                                    Cliquez sur une région de la carte pour afficher son profil détaillé.
                                </p>
                                <div style={{marginTop:16, paddingTop:16, borderTop:'1px solid var(--rule)'}}>
                                    <p style={{fontFamily:'var(--mono)', fontSize:'9px', color:'var(--ink-3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8}}>Note de lecture</p>
                                    <p style={{fontFamily:'var(--sans)', fontSize:'11px', color:'var(--ink-2)', lineHeight:1.6}}>
                                        Faites glisser le curseur d'année pour faire apparaître l'analyse décennale en bas de carte. 
                                        Survolez les régions pour voir des détails contextuels.
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* footer credit */}
                    <div style={{padding:'10px 16px', borderTop:'1px solid var(--rule)'}}>
                        <p style={{fontFamily:'var(--sans)', fontSize:'9px', color:'var(--ink-3)', lineHeight:1.5}}>
                            Sources : Agreste · Citepa · SDES<br/>
                            Recensements agricoles 1990–2020<br/>
                            <a onClick={() => setShowAbout(true)} style={{color:'var(--accent)', cursor:'pointer', textDecoration:'none', borderBottom:'1px solid var(--accent)'}}>
                                En savoir plus sur les données
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
